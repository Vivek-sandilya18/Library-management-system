<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Status Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1600&q=80')
      no-repeat center center/cover;
      font-family: 'Poppins', sans-serif;
      color: white;
    }
    .container {
      background: rgba(0, 0, 0, 0.7);
      border-radius: 15px;
      padding: 30px;
      margin-top: 50px;
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }
    h1 {
      text-align: center;
      color: #f1f1f1;
      margin-bottom: 30px;
    }
    table th {
      background-color: #343a40;
      color: white;
    }
    .form-control, .form-select {
      background-color: rgba(255,255,255,0.9);
      border: none;
      color: #000;
    }
    .btn-confirm {
      background-color: #28a745;
      color: white;
      font-weight: 500;
    }
    .btn-confirm:hover {
      background-color: #218838;
    }
  </style>
  
</head>

<body>

  <div class="container">
    <h1>Library Book Status</h1>

    <div class="row">
      
      
      <div class="col-md-5">
        <h4 class="text-center mb-3"> Book Details</h4>

        
			<form th:action="@{/status/save}" method="post" th:object="${status}" >
		    <input type="hidden" th:field="*{user.id}" />

		    <div class="mb-3">
		        <label class="form-label">Book ID</label>
		        <input type="text" class="form-control" th:field="*{bookId}" required>
		    </div>

		    <div class="mb-3">
		        <label class="form-label">Book Name</label>
		        <input type="text" class="form-control" th:field="*{bookName}" required>
		    </div>

		    <div class="mb-3">
		        <label class="form-label">Issue Date</label>
		        <input type="date" class="form-control" th:field="*{issueDate}" required>
		    </div>

		    <div class="mb-3">
		        <label class="form-label">Return Date</label>
		        <input type="date" class="form-control" th:field="*{returnDate}" required>
		    </div>

		    <div class="mb-3">
		        <label class="form-label">Status</label>
		        <select class="form-select" th:field="*{yourStatus}" required>
		            <option value="">Select Status</option>
		            <option value="Issued">Issued</option>
		            <option value="Returned">Returned</option>
		            <option value="Pending">Pending</option>
		        </select>
		    </div>

		    <button type="submit" class="btn btn-confirm w-100">Confirm</button>
		</form>

        <div class="text-center mt-3">
          <a class="btn btn-success btn-sm" th:href="@{/users}">Go Back</a>
        </div>
      </div>

     
      <div class="col-md-7">
        <h4 class="text-center mb-3">Book Records</h4>
        <table class="table table-bordered table-striped table-hover text-center">
          <thead class="table-dark">
            <tr>
              <th>Book ID</th>
              <th>Book Name</th>
              <th>Issue Date</th>
              <th>Return Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="rec : ${records}">
              <td th:text="${rec.bookId}"></td>
              <td th:text="${rec.bookName}"></td>
              <td th:text="${#dates.format(rec.issueDate,'yyyy-MM-dd')}"></td>
              <td th:text="${#dates.format(rec.returnDate,'yyyy-MM-dd')}"></td>
              <td th:text="${rec.yourStatus}"></td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
  
  


</body>
</html>
