<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Welcome Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
		<link rel="stylesheet" th:href="@{/user.css}" >
</head>

<body>
   <body>
    <div class="mycontainer text-center">
        <h1>Welcome to Library</h1>

        <h2 class="mb-3 mt-3">User Details</h2>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>User ID</th>
                    <th>User Name</th>
                    <th>User Email</th>
                    <th colspan="3">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.user_id}"></td>
                    <td th:text="${user.name}">Mark</td>
                    <td th:text="${user.email}">mark@gmail.com</td>
                    <td>
                        <a class="btn btn-primary btn-sm" th:href="@{/delete/{id}(id=${user.id})}">delete</a>
                    </td>
                    
                     <td>
						<a class="btn btn-success btn-sm" 
						   th:href="@{/status/{userId}(userId=${user.id})}">
						   Status
						</a>
                    </td>
                   
                </tr>
            </tbody>
        </table>
		 <td>
                        <div class="text-center mt-3">
  <a class="btn btn-success btn-sm" th:href="@{/}">Go Back</a>
</div>
                    </td>
    </div>
</body>

</html>
